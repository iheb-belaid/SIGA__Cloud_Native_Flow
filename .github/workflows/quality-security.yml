name: Quality And Security

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: quality-security-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-security:
    name: SonarQube And OWASP Checks
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on:
      - self-hosted
      - Linux
    timeout-minutes: 45
    env:
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout repository from CI commit
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Checkout repository for manual run
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend tests and JaCoCo report
        working-directory: backend
        run: |
          chmod +x mvnw
          ./mvnw -B verify

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Explain skipped SonarQube analysis
        if: ${{ env.SONAR_HOST_URL == '' || env.SONAR_TOKEN == '' }}
        run: echo "SonarQube analysis skipped because SONAR_HOST_URL or SONAR_TOKEN is missing."

      - name: Analyze backend with SonarQube
        if: ${{ env.SONAR_HOST_URL != '' && env.SONAR_TOKEN != '' }}
        working-directory: backend
        run: |
          ./mvnw -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=${{ github.repository_owner }}_siga-cloud-native-flow-backend \
            -Dsonar.projectName="SIGA Cloud Native Flow Backend" \
            -Dsonar.host.url=${SONAR_HOST_URL} \
            -Dsonar.token=${SONAR_TOKEN} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      - name: Analyze frontend with SonarQube
        if: ${{ env.SONAR_HOST_URL != '' && env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: frontend
          args: >
            -Dsonar.projectKey=${{ github.repository_owner }}_siga-cloud-native-flow-frontend

      - name: Create OWASP report directory
        run: mkdir -p reports/dependency-check

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        id: dependency-check
        env:
          JAVA_HOME: /opt/jdk
          JAVA_HOME_21_X64: /opt/jdk
        with:
          project: SIGA Cloud Native Flow
          path: .
          format: ALL
          out: reports/dependency-check

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-report
          path: backend/target/site/jacoco
          retention-days: 7

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage/frontend
          retention-days: 7

      - name: Upload OWASP Dependency-Check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/dependency-check
          retention-days: 7
